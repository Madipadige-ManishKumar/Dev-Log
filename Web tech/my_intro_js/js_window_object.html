<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Actions</title>
    <script>
        function closeWindow() {
            window.close();
        }

        function openWindow() {
            window.open("https://www.w3schools.com/Jsref/met_win_addeventlistener.asp");
        }

        function showAlert() {
            window.alert("This is an alert!");
        }

        function showConfirm() {
            let userResponse = window.confirm("Do you want to continue?");
            alert("User response: " + userResponse);
        }

        function showPrompt() {
            let userInput = window.prompt("Please enter something:");
            alert("You entered: " + userInput);
        }

        function showInnerHeight() {
            alert("Inner Height: " + window.innerHeight);
        }

        function showInnerWidth() {
            alert("Inner Width: " + window.innerWidth);
        }

        function showScrollX() {
            alert("Scroll X position: " + window.scrollX);
        }
        function my_writer()
        {
            document.getElementById("demo").innerHTML+="salman bhai ";
        }
        function goback()
        {
            window.history.back(); 
        }
        window.addEventListener('mouseover',my_writer);
        window.addEventListener('click',showAlert);
    </script>
</head>
<body>
    <h1>Window Actions Example</h1>
    <p id="demo"></p>
    <button onclick="closeWindow()">Close Window</button>
    <button onclick="openWindow()">Open Window</button>
    <button onclick="showAlert()">Alert</button>
    <button onclick="showConfirm()">Confirm</button>
    <button onclick="showPrompt()">Prompt</button>
    <button onclick="showInnerHeight()">showInnerHeight</button>
    <button onclick="showInnerWidth()">showInnerWidth</button>
    <button onclick="showScrollX()">showScrollX</button>
