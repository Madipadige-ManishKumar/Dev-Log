<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobbies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fc;
            color: #333;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-top: 20px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        li {
            font-size: 1.2em;
            margin: 10px 0;
            background-color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            width: 250px;
            text-align: center;
        }

        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            width: 300px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        input[type="button"] {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        input[type="button"]:hover {
            background-color: #2980b9;
        }

        img {
            display: block;
            margin: 30px auto;
            border-radius: 10px;
        }

        object {
            display: block;
            margin: 30px auto;
            width: 300px;
            height: 300px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Hobbies</h1>
        <img src="LocalSeek/images/img3.jpg"  style="width: 300px;height: auto;" alt="hello">
        <ul>
            <li>Playing Video Games</li>
            <li>Watching Reels</li>
            <li>Watching TV</li>
            <li>48 Laws of Power</li>
            <li>Devara</li>
        </ul>
        
        <center>
        <iframe width="420" height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY?controls=0">
        </iframe>
        
    </center>

        <form action="#">
            <h1>Enter Your Feedback</h1>
            <input type="text" name="text" placeholder="Type your feedback here">
            <input type="button" value="Submit">
        </form>


    </div>

</body>
</html>
