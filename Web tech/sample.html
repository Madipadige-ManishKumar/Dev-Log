<!DOCTYPE html>
<head>
    <title>
    elseif conditional statement
    </title>
    <script language = "javascript">
    var stdmarks;
    var stdmarks = prompt("enter student marks" ,"stdmarks");
    if(stdmarks>=90)
    document.writeln("GRADE A");
    elseif(stdmarks>=80)
    document.writeln("GRADE B");
    elseif(stdmarks>=70)
    document.writeln("GRADE C");
    elseif(stdmarks>=60)
    document.writeln("GRADE D");
    else
    document.writeln("failed grade");
    
    </script>
    </head>
</html>
