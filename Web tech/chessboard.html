<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chessboard</title>
  <style>
    /* Chessboard styling */
    .chessboard {
      display: grid;
      grid-template-columns: repeat(8, 62.6px);    
      grid-template-rows: repeat(8, 62.6px);    
      gap: 0;
      width: 500px; 
      height: 500px;
      border: 2px solid black; 
    }

    
    .square {
      width: 62.6px;
      height: 62.6px;
    }

    
    .squaredark{
      background-color: black;                       
    }

    /* Light square color */
    .squarelight{
      background-color: white; 
    }
    .squaredark:hover{
        background-color: cyan;
    }
    .squarelight:hover{
        background-color:maroon;
    }
  </style>
</head>
<body>
    

  <center>
    <h1>ChessBoard</h1>
    <br>
  <div class="chessboard">
    
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>

    <!-- Row 2 -->
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>

    <!-- Row 3 -->
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>

    <!-- Row 4 -->
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>

    <!-- Row 5 -->
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>

    <!-- Row 6 -->
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>

    <!-- Row 7 -->
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>

    <!-- Row 8 -->
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
    <div class="squaredark"></div>
    <div class="squarelight"></div>
  </div>
</center>
</body>
</html>
