<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalSeek</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> -->
    <link href="../style/style1.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-store me-2"></i>LocalSeek
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex ms-auto" id="searchForm">
                    <input class="form-control me-2" type="search" name="q" placeholder="Search products...">
                    <button class="btn btn-outline-light" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="text-center mb-5">
            <h1 class="display-4">Find Local Stores Near You</h1>
            <p class="lead">Discover products from your neighborhood stores</p>
        </div>

        <section class="mb-5">
            <h2 class="mb-4">Shop by Category</h2>
            <div class="row g-4" id="categories-container">
                <!-- Categories will be dynamically loaded -->
            </div>
        </section>

        <section class="mb-5">
            <h2 class="mb-4">Featured Products</h2>
            <div class="row g-4" id="products-container">
                <!-- Products will be dynamically loaded -->
            </div>
        </section>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>LocalSeek</h5>
                    <p>Find the best local stores near you</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p>&copy; 2025 LocalSeek. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../main.js"></script>


    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.71/build/spline-viewer.js"></script>
<spline-viewer url="https://prod.spline.design/iSdgE9VEYfoHpc5o/scene.splinecode"></spline-viewer>
</body>
</html>
