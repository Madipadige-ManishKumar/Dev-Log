<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Product Entry - LocalSeek</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #121212;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
        }
        
        .logo {
            color: #4d90fe;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
        }
        
        .search-container {
            display: flex;
        }
        
        .search-container input {
            background-color: #333;
            border: none;
            padding: 8px 15px;
            color: #ffffff;
            border-radius: 4px 0 0 4px;
        }
        
        .search-container button {
            background-color: #4d90fe;
            border: none;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 8px;
        }
        
        .form-container {
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: white;
            box-sizing: border-box;
        }
        
        .file-input {
            margin-top: 5px;
        }
        
        .submit-btn {
            background-color: #4d90fe;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 15px;
        }
        
        .submit-btn:hover {
            background-color: #357ae8;
        }
        
        textarea {
            height: 100px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="#" class="logo">LocalSeek</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Login</a>
            <a href="#">Sign up</a>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search local items">
            <button type="submit">Search</button>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <div class="form-container">
            <h1>Seller Product Entry</h1>
            <form>
                <div class="form-group">
                    <label for="productName">Product Name:</label>
                    <input type="text" id="productName" name="productName" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" name="category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Home">Home & Kitchen</option>
                        <option value="Books">Books</option>
                        <option value="Toys">Toys & Games</option>
                        <option value="Beauty">Beauty & Personal Care</option>
                        <option value="Sports">Sports & Outdoors</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="brandName">Brand Name:</label>
                    <input type="text" id="brandName" name="brandName">
                </div>
                
                <div class="form-group">
                    <label for="price">Price (Rs):</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="stockQuantity">Stock Quantity:</label>
                    <input type="number" id="stockQuantity" name="stockQuantity" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="unitType">Unit Type:</label>
                    <select id="unitType" name="unitType" required>
                        <option value="Per Piece">Per Piece</option>
                        <option value="Per Pack">Per Pack</option>
                        <option value="Per Kg">Per Kg</option>
                        <option value="Per Liter">Per Liter</option>
                        <option value="Per Dozen">Per Dozen</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="discount">Discount/Offer (%):</label>
                    <input type="number" id="discount" name="discount" min="0" max="100">
                </div>
                
                <div class="form-group">
                    <label for="storeName">Store Name:</label>
                    <input type="text" id="storeName" name="storeName" required>
                </div>
                
                <div class="form-group">
                    <label for="storeAddress">Store Address:</label>
                    <textarea id="storeAddress" name="storeAddress" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="productImage">Product Image:</label>
                    <input type="file" id="productImage" name="productImage" class="file-input">
                </div>
                
                <button type="submit" class="submit-btn">Submit Product</button>
            </form>
        </div>
    </div>
</body>
</html>
