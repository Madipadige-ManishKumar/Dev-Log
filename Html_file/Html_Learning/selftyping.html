<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins',sans-serif;
}

.container{
    width: 100%;
    height: 100vh;
    background-color:#fff ;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container h5{
    font-size: 40px;
    font-weight: 600;       
</style>
<div class="body">
<div class="container">
    <h5>  <span style="color: cyan;"> We provide </span>  <span class="auto-type"></span></h5>
</div>
<script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
<script>
    var typed =new Typed(".auto-type",{
        strings:["Drone surveying","Lidar mapping","3d laser scanning ","Thermal surveys","Ground Control surveys using DGPS","Topographic and cadastral surveys","Asset mapping","Bathymetry","GPR (Ground penetrating radar)"],
        typeSpeed:50,
        backspeed:150,
        loop:true
    })
</script>
</div>
</body>
</html>
