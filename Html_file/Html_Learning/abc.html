<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <title>Document</title>
    <style>
    .button
    {
        display: flex;
        align-items: center;
        justify-content: center;

    }
     .container{
        display: flex;
        /* background-color: cyan;   */
        align-items: center;
        justify-content: center;
     }
     .inputs{   
        padding-left: 20%;
        align-items: center;
        justify-content: center;
     }
    </style>
</head>
<body>

    <div class="container">
    <fieldset  style="display: flex;  height: 1600px;  width: 900px; background-color: cyan;  " class="border p-5">
        <legend style="font-size: 30px; ;"><h1>Diabetes</h1></legend>
        <fieldset  style="display: flex;  height: 1390px; background-color: #FFF; width: 900px;  " class="outfield">
        
        
    <form action="excersice.html"  method="post">
        <div class="inputs">
            <fieldset  class="border p-5" style="width: 600px;">
                <legend><h1>Glucose</h1></legend>
        <input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The glucose   eg:80"  name="glucose">
    </fieldset>
    <fieldset class="border p-5"  style="width: 600px;">
        <legend><h1>BloodPressure</h1></legend>
<input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The BloodPressure   eg:80"  name="BloodPressure">
</fieldset>
<fieldset class="border p-5" style="width: 600px;">
    <legend><h1>SkinThickness</h1></legend>
<input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The SkinThickness   eg:20"  name="SkinThickness">
</fieldset >
<fieldset class="border p-5" style="width: 600px;">
    <legend><h1>Insulin</h1></legend>
<input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The Insulin   eg:80"  name="Insulin">
</fieldset >

<fieldset class="border p-5" style="width: 600px;">
    <legend><h1>Body Mass Index</h1></legend>
<input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The BMI  eg:80"  name="BMI">
</fieldset>
<fieldset   style="width: 600px;" class="border p-5">
    <legend><h1>DiabetesPedigreeFunction</h1></legend>
<input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The DiabetesPedigreeFunction  eg:80"  name="dpf">
</fieldset>
<fieldset  style="width: 600px;"  class="border p-5">
    <legend><h1>Age</h1></legend>
<input type="text"  style="  height: 20px; width: 400px;"  placeholder="Enter The Age   eg:30"  name="age">
</fieldset>
<div class="button">
            <button type="submit" class="btn btn-outline-primary">Primary</button></div>
        </div>

</form>
    
    </fieldset>
    
    </fieldset>
</div>


<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
