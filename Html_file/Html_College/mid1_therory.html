<!DOCTYPE html>
<html>
<head>
  <title>Frames Example</title>
</head>
<frameset cols="25%, 75%">
  <!-- First frame with a navigation menu -->
  <iframe src="file:///C:/Users/M.Manish%20kumar/OneDrive/Desktop/allapps/C21_CS/C21_CS_V%20SEM.pdf" frameborder="0"></iframe>
  
  <!-- Second frame for displaying content -->
  <frame src="content.html" name="content">

  
  
  <!-- Fallback content for browsers that do not support frames -->
  <noframes>
    <body>
      <p>This page uses frames, but your browser doesn't support them.</p>
    </body>
  </noframes>
</frameset>
</html>
